name: Test Suite

on:
  push:
    branches:
      - main
      - "feature/**"
      - "setup/**"
      - "ci/**"
      - "docs/**"
      - "quality/**"
      - "release/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: pytest -v --cov=src --cov-report=term-missing --cov-fail-under=95
